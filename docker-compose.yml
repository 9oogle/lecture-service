services:
  lecture-service:
    image: asia-northeast3-docker.pkg.dev/melodic-crane-494802-u3/goggles/lecture-service:${IMAGE_TAG:-latest}
    container_name: lecture-service
    restart: unless-stopped
    ports:
      - "9005:9005"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # DB
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      TRUST_STORE_PASSWORD: ${TRUST_STORE_PASSWORD}
      # Redis
      REDIS_SENTINEL_1: ${REDIS_SENTINEL_1}
      REDIS_SENTINEL_2: ${REDIS_SENTINEL_2}
      REDIS_SENTINEL_3: ${REDIS_SENTINEL_3}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Eureka
      EUREKA_SERVER_URL1: ${EUREKA_SERVER_URL1}
      EUREKA_SERVER_URL2: ${EUREKA_SERVER_URL2}
      # Monitoring
      MONITORING_HOST: ${MONITORING_HOST}