services:
  postgres:
    image: postgres:16
    container_name: goggles-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goggles
      POSTGRES_USER: goggles
      POSTGRES_PASSWORD: goggles
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goggles -d goggles"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: goggles-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zipkin:
    image: openzipkin/zipkin
    container_name: goggles-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"

  # ── Kafka (KRaft 모드, Zookeeper 없는 단일 브로커) ─────────────────────
  # 운영 인프라(GCP VM 3브로커 클러스터)와 동일한 토픽/Consumer 인터페이스로
  # 로컬에서도 주문완료(결제) → 수강 활성화 이벤트 흐름을 그대로 시연
  kafka:
    image: bitnami/kafka:3.7
    container_name: goggles-kafka
    ports:
      - "9092:9092"      # 호스트 머신(로컬 IDE)에서 접속
      - "9093:9093"      # 컨트롤러 (내부)
    environment:
      # KRaft 모드 — controller 와 broker 를 한 프로세스가 겸함
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # 단일 브로커라 RF=1 / ISR=1 로 강제
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # 토픽/메시지 GUI 관리용
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: goggles-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8989:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  postgres-data:
