spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

# Kafka 토픽 placeholder (KafkaListener가 요구)
topics:
  order:
    lecture-cancelled: test.order.lecture-cancelled
    lecture-completed: test.order.lecture-completed

management:
  tracing:
    sampling:
      probability: 0.0
  zipkin:
    tracing:
      endpoint: ""

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false