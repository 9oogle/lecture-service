spring:
  application:
    name: lecture-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
    include:
      - topics
    group:
      dev: "kafka"
      prod: "kafka"
  config:
    import:
      - optional:file:.env[.properties]
      - "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
      fail-fast: false

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME:goggles}
    password: ${DB_PASSWORD:goggles}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        default_schema: lecture
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Config Server를 Eureka로 찾으려면 Eureka 주소만 로컬에 있으면 됨
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_SERVER_URL1:localhost}:9001/eureka/,http://${EUREKA_SERVER_URL2:localhost}:9002/eureka/