spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/goggles
    username: ${DB_USERNAME:goggles}
    password: ${DB_PASSWORD:goggles}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # ※ 시드 데이터(data.sql)는 docker entrypoint 로 주입한다.
  #    init/01-init.sql → init/02-data.sql 순서로 자동 실행됨.

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: localhost
      port: 6379

  # 로컬에서도 주문 서비스의 order.enrollment.completion 이벤트를 받아야 하므로
  # docker-compose 의 lecture-kafka(KRaft 단일 브로커
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      group-id: ${spring.application.name}
    listener:
      missing-topics-fatal: false

management:
  tracing:
    sampling:
      probability: 0.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:9001/eureka/,http://localhost:9002/eureka/
